<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeScan Pro - Gestão de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="carrinho-de-compras.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#0a141d',
                        brandGreenDeep: '#065f46',
                        brandGreenMain: '#10b981',
                        brandGreenLight: '#dcfce7',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brandDark text-brandGreenLight font-['Plus_Jakarta_Sans'] antialiased transition-colors duration-300">

    <header class="max-w-6xl mx-auto px-4 pt-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🛒</span>
            <span class="text-2xl font-extrabold tracking-tighter text-white uppercase header-title">HomeScan <span class="text-brandGreenMain">Pro</span></span>
        </div>
        <button id="themeToggle" class="p-3 rounded-xl bg-brandGreenDeep/20 border border-brandGreenDeep/30 text-brandGreenMain hover:bg-brandGreenDeep/40 transition-all shadow-lg">
            <span id="themeIcon">🌙</span>
        </button>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-8 md:py-12 min-h-screen">
        
        <div id="api-message-container" class="max-w-2xl mx-auto mb-10 p-4 bg-brandGreenDeep/10 rounded-2xl border border-brandGreenMain/20 flex items-center gap-3 shadow-sm">
            <span class="text-xl">🌿</span>
            <p id="api-phrase" class="text-sm font-semibold text-brandGreenMain italic text-center w-full">Sincronizando sabedoria...</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-8">
                <header class="mb-10 text-center md:text-left">
                    <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2 main-title">Minha Lista</h1>
                    <p class="text-brandGreenMain font-medium opacity-80 subtitle-text">Organização inteligente com sua paleta exclusiva.</p>
                </header>

                <div class="card-container bg-[#111d27] rounded-[2.5rem] shadow-2xl border border-white/5 overflow-hidden">
                    <div class="p-8 bg-brandDark/40 border-b border-white/5 grid grid-cols-1 md:grid-cols-2 gap-4 card-header">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-brandGreenMain mb-2 ml-1">Título da Lista</label>
                            <input type="text" id="listTitle" placeholder="Ex: Rancho do Mês" 
                                class="w-full bg-brandDark border border-white/10 rounded-2xl px-5 py-3 font-bold focus:ring-4 focus:ring-brandGreenMain/20 focus:border-brandGreenMain outline-none transition-all text-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-brandGreenMain mb-2 ml-1">Data</label>
                            <input type="date" id="shoppingDate" 
                                class="w-full bg-brandDark border border-white/10 rounded-2xl px-5 py-3 font-semibold focus:ring-4 focus:ring-brandGreenMain/20 focus:border-brandGreenMain outline-none transition-all text-white">
                        </div>
                    </div>

                    <div class="p-8">
                        <div class="flex gap-3">
                            <input type="text" id="itemInput" placeholder="O que vamos comprar hoje?" 
                                class="flex-1 bg-brandDark border border-white/10 rounded-2xl px-6 py-4 text-lg focus:ring-4 focus:ring-brandGreenMain/20 focus:border-brandGreenMain outline-none transition-all text-white">
                            <button id="addBtn" class="bg-brandGreenMain hover:bg-brandGreenDeep text-brandDark px-8 rounded-2xl font-black transition-all shadow-lg active:scale-95">+</button>
                        </div>
                    </div>

                    <div class="px-4">
                        <ul id="shoppingList" class="space-y-1"></ul>
                    </div>

                    <div id="completedSection" class="mt-6 border-t border-white/5 hidden">
                        <div class="px-8 py-4 bg-brandDark/20 flex items-center justify-between carrinho-header">
                            <span class="text-[10px] font-bold text-brandGreenMain/60 uppercase tracking-widest">No Carrinho</span>
                            <span id="completedCount" class="text-xs font-bold bg-brandGreenMain text-brandDark px-2 py-1 rounded-md">0</span>
                        </div>
                        <ul id="completedList" class="px-4 pb-8 space-y-1 opacity-50"></ul>
                    </div>

                    <div class="p-8 bg-brandDark/60 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 card-footer">
                        <div id="stats" class="text-xs font-bold text-brandGreenMain tracking-wider uppercase">0 Itens</div>
                        <button id="saveListBtn" class="w-full md:w-auto bg-brandGreenMain hover:bg-brandGreenDeep text-brandDark px-10 py-4 rounded-[1.5rem] font-extrabold transition-all shadow-xl shadow-brandGreenMain/10">
                            Finalizar e Arquivar
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <h2 class="text-2xl font-bold text-white mb-8 flex items-center justify-between history-title">
                    Histórico 
                    <span id="historyCount" class="text-sm bg-brandGreenDeep text-brandGreenMain px-3 py-1 rounded-full">0</span>
                </h2>
                <div id="historyContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <footer class="py-12 border-t border-white/5 text-center mt-10 site-footer">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex flex-col items-center gap-2">
                <span class="text-xl">🛒</span>
                <p class="footer-brand font-bold tracking-widest text-xs uppercase text-brandGreenMain">HomeScan Pro</p>
                <p class="footer-text text-brandGreenMain/40 text-[11px] font-medium">Desenvolvido para sua melhor organização pessoal.</p>
                <div class="footer-copy mt-4 text-[10px] text-brandGreenMain/30">© 2026 • Todos os direitos reservados.</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
